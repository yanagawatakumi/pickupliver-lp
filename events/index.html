<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PICK UP LIVER の各回アーカイブ一覧" />
    <title>PICK UP LIVER Episodes</title>
    <style>
      :root {
        --bg: #f7f9ff;
        --card: #ffffff;
        --ink: #1d2433;
        --line: #d0d8f0;
        --accent: #2d6bff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--ink);
        font-family: "M PLUS Rounded 1c", "Hiragino Kaku Gothic ProN", sans-serif;
        background: radial-gradient(circle at 10% 0%, #eef3ff, transparent 40%), radial-gradient(circle at 100% 100%, #fff1f8, transparent 35%), var(--bg);
      }
      .wrap {
        width: min(920px, calc(100% - 32px));
        margin: 24px auto 48px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
      }
      .lead {
        margin: 0 0 18px;
        opacity: 0.8;
      }
      .archive-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 12px;
      }
      .archive-item {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
      }
      .archive-link {
        display: block;
        color: inherit;
        text-decoration: none;
        padding: 16px;
      }
      .archive-link:hover {
        background: #f5f8ff;
      }
      .archive-head {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
      }
      .archive-head h2 {
        margin: 0;
        font-size: clamp(1rem, 2.5vw, 1.2rem);
      }
      .badge-row {
        display: flex;
        gap: 6px;
      }
      .badge {
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 0.72rem;
        font-weight: 700;
        border: 1px solid #b9c8f3;
        background: #eaf0ff;
      }
      .badge.latest {
        border-color: #8ea8ff;
        background: #dce6ff;
        color: #0b38b8;
      }
      .badge.state {
        border-color: #f2bfd4;
        background: #ffedf5;
        color: #8f2e53;
      }
      .archive-meta {
        margin: 10px 0 0;
        font-size: 0.84rem;
        color: #4a587a;
      }
      .error {
        margin: 12px 0 0;
        color: #a1282e;
        font-weight: 700;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <main class="wrap">
      <h1>PICK UP LIVER</h1>
      <p class="lead">公開中・過去回ページの一覧です。</p>
      <ul id="events-list" class="archive-list"></ul>
      <p id="events-error" class="error" hidden></p>
    </main>
    <script src="/src/scripts/events-index.js"></script>
  </body>
</html>
