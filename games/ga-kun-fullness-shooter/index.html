<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="がーくん満腹シューティング。弾幕を避けながら食材を完食して、満腹100%を目指そう。" />
    <meta name="vt:game-config" content="/content/games/ga-kun-fullness-shooter/config.json" />
    <title>がーくん満腹シューティング</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&family=Yusei+Magic&family=Yuji+Syuku&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles/ga-kun-fullness-shooter.css" />
  </head>
  <body>
    <div class="bg-layer" aria-hidden="true"></div>

    <header class="game-header">
      <div class="header-links">
        <a class="nav-pill" href="/events/vol-2/">VOL.2ページへ戻る</a>
        <a class="nav-pill" href="/events/">過去回一覧</a>
      </div>
      <p class="kicker">PICK UP LIVER MINI GAME</p>
      <h1>がーくん満腹シューティング</h1>
      <p class="lead">弾幕をよけながら食材を完食。満腹100%でクリア！ 80%で巨大料理モンスターが登場します。</p>
    </header>

    <main class="game-layout">
      <section class="play-panel card">
        <div class="canvas-shell">
          <canvas id="game-canvas" width="420" height="720" aria-label="ゲーム画面"></canvas>
          <div class="hud hud-in-canvas">
            <div class="hud-item">
              <span class="hud-label">HP</span>
              <span id="hp-value" class="hud-value">3 / 3</span>
            </div>
            <div class="hud-item hud-item-wide">
              <span class="hud-label">満腹ゲージ</span>
              <div class="meter">
                <div id="fullness-fill" class="meter-fill"></div>
              </div>
              <span id="fullness-value" class="hud-sub">0%</span>
            </div>
            <div class="hud-item">
              <span class="hud-label">SCORE</span>
              <span id="score-value" class="hud-value">0</span>
            </div>
          </div>
          <div id="overlay-screen" class="overlay-screen">
            <p id="overlay-message" class="overlay-message">難易度を選んでスタート</p>
            <div id="stage-buttons" class="overlay-stage-buttons" role="list" aria-label="難易度一覧"></div>
          </div>
          <div id="clear-flash" class="clear-flash" hidden>
            <span id="clear-flash-main" class="clear-flash-main">満腹</span>
            <p id="clear-flash-sub" class="clear-flash-sub" hidden></p>
          </div>
          <div id="skill-dock" class="skill-dock" aria-label="必殺技レーン"></div>
        </div>

        <div class="help-row">
          <p>操作: `WASD / 矢印キー` または `画面ドラッグ`</p>
          <p>食材を完食すると、低確率でゲスト必殺技が即時発動します。</p>
          <p id="stage-note" role="status" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <script src="/src/scripts/ga-kun-fullness-shooter.js"></script>
  </body>
</html>
